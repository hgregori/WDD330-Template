<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="checkout-form">
        <h2>Review & Place your Order</h2>
        <form name="checkout" id="checkout-form">
          <fieldset>
            <legend>Shipping & Billing</legend>
            <label for="fname">First Name <input type="text" name="fname" id="fname" required></label>
            <label for="lname">Last Name <input type="text" name="lname" id="lname" required></label>
            <label for="street">Street Address <input type="text" name="street" id="street" required></label>
            <label for="city">City <input type="text" name="city" id="city" required></label>
            <label for="state">State <input type="text" name="state" id="state" required></label>
            <label for="zip">Zip Code <input type="text" name="zip" id="zip" required></label>
          </fieldset>

          <fieldset>
            <legend>Payment</legend>
            <label for="cardNumber">Credit Card Number <input type="text" name="cardNumber" id="cardNumber" placeholder="1234123412341234" required></label>
            <label for="expiration">Expiration Date <input type="text" name="expiration" id="expiration" placeholder="MM/YY" required></label>
            <label for="code">Security Code <input type="text" name="code" id="code" placeholder="123" required></label>
          </fieldset>
          
          <div class="checkout-summary">
            <h3>Order Summary</h3>
            <p>Item Subtotal (<span id="num-items">0</span>): <span id="cartTotal">$0.00</span></p>
            <p>Tax: <span id="tax">$0.00</span></p>
            <p>Shipping Estimate: <span id="shipping">$0.00</span></p>
            <p class="order-total"><strong>Order Total: <span id="orderTotal">$0.00</span></strong></p>
          </div>

          <button type="submit" id="checkoutSubmit">Checkout</button>
        </form>
      </section>
    </main>

    <footer id="main-footer"></footer>
    <script type="module" src="../js/checkout.js"></script>
  </body>
</html>
